# Create a GitHub Release when a version tag (v*) is pushed.
# To create the first release: git tag v0.1.0 && git push origin v0.1.0
#
# If you get 403 "Resource not accessible by integration": repo Settings →
# Actions → General → Workflow permissions → choose "Read and write permissions".

name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create GitHub Release
        run: |
          gh release create "${{ github.ref_name }}" --title "${{ github.ref_name }}" \
            --notes "See [CHANGELOG](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
